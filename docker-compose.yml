services:
  postgres:
    image: postgres:16
    container_name: mini-saas-postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_dashboard

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: mini-saas-backend

    ports:
      - "5000:5000"

    environment:
      DB_HOST: postgres

      DB_PORT: 5432

      DB_NAME: saas_dashboard

      DB_USER: admin

      DB_PASSWORD: password

      JWT_SECRET: your_secret_key

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: mini-saas-frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

volumes:
  postgres_data:
